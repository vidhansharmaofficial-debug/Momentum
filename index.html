<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Momentum</title>

  <style>
    :root {
      --bg: #0f0f12;
      --panel: rgba(22, 22, 26, 0.75);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.6);
      --border: rgba(255,255,255,0.06);
      --accent: #7c5cff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 16px;
      backdrop-filter: blur(12px);
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .nav-item {
      padding: 10px;
      border-radius: 12px;
      color: var(--muted);
      cursor: pointer;
      margin-bottom: 6px;
      transition: 0.2s;
    }

    .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-item.active { background: rgba(124,92,255,0.18); color: var(--text); }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      backdrop-filter: blur(12px);
    }

    .search {
      flex: 1;
      margin-right: 16px;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: none;
      color: var(--text);
      outline: none;
    }

    .content {
      padding: 24px;
      overflow: auto;
      transition: opacity 0.15s ease;
    }

    .card {
      background: var(--panel);
      padding: 20px;
      border-radius: 18px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .title { font-size: 20px; margin-bottom: 6px; }
    .subtitle { color: var(--muted); }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>
<div class="app">

  <div class="sidebar">
    <div class="logo">⚡ Momentum</div>

    <div class="nav-item active" onclick="loadPage('dashboard', this)">Dashboard</div>
    <div class="nav-item" onclick="loadPage('tasks', this)">Tasks</div>
    <div class="nav-item" onclick="loadPage('notes', this)">Notes</div>
    <div class="nav-item" onclick="loadPage('habits', this)">Habits</div>
    <div class="nav-item" onclick="loadPage('calendar', this)">Calendar</div>
    <div class="nav-item" onclick="loadPage('scratchpad', this)">Scratchpad</div>
    <div class="nav-item" onclick="loadPage('spaces', this)">Spaces</div>
    <div class="nav-item" onclick="loadPage('insights', this)">Insights</div>
    <div class="nav-item" onclick="loadPage('settings', this)">Settings</div>
  </div>

  <div class="main">
    <div class="topbar">
      <input class="search" placeholder="Search Momentum..." />
      <div>🔔 🎵 👤</div>
    </div>

    <div class="content" id="content"></div>
  </div>

</div>

<script type="module">
  import { getStore } from "./src/core/store.js";

  import { addTask, deleteTask, toggleTask } from "./src/modules/tasks.js";
  import { addNote, deleteNote } from "./src/modules/notes.js";
  import { addHabit, completeHabit, getHabits } from "./src/modules/habits.js";

  import {
    getTaskStats,
    getHabitStats,
    getMomentumScore
  } from "./src/modules/insights.js";

  const content = document.getElementById("content");
  const items = document.querySelectorAll(".nav-item");

  function loadPage(page, el) {
    content.style.opacity = "0";

    setTimeout(() => {
      content.innerHTML = pages[page] || "";
      content.style.opacity = "1";
    }, 120);

    items.forEach(i => i.classList.remove("active"));
    if (el) el.classList.add("active");
  }

  /* ---------------- TASKS ---------------- */
  function renderTasks() {
    const store = getStore();

    return `
      <div class="card"><div class="title">Tasks</div></div>

      ${store.tasks.map(t => `
        <div class="card">
          <div class="title" style="${t.done ? 'text-decoration:line-through;opacity:0.5;' : ''}">
            ${t.text}
          </div>
          <button onclick="window.__toggleTask(${t.id})">Toggle</button>
          <button onclick="window.__deleteTask(${t.id})">Delete</button>
        </div>
      `).join("")}

      <div class="card">
        <input id="taskInput" placeholder="Add task..." style="width:100%;padding:10px;border-radius:10px;border:none;background:rgba(255,255,255,0.05);color:white;" />
        <button onclick="window.__addTask()">Add Task</button>
      </div>
    `;
  }

  /* ---------------- NOTES ---------------- */
  function renderNotes() {
    const store = getStore();

    return `
      <div class="card"><div class="title">Notes</div></div>

      <div class="card">
        <input id="noteTitle" placeholder="Title..." style="width:100%;padding:10px;margin-bottom:10px;border-radius:10px;border:none;background:rgba(255,255,255,0.05);color:white;" />
        <textarea id="noteContent" placeholder="Write note..." style="width:100%;height:120px;padding:10px;border-radius:10px;border:none;background:rgba(255,255,255,0.05);color:white;"></textarea>
        <button onclick="window.__addNote()">Save Note</button>
      </div>

      ${store.notes.map(n => `
        <div class="card">
          <div class="title">${n.title}</div>
          <div class="subtitle">${n.content}</div>
          <button onclick="window.__deleteNote(${n.id})">Delete</button>
        </div>
      `).join("")}
    `;
  }

  /* ---------------- HABITS ---------------- */
  function renderHabits() {
    const habits = getHabits();

    return `
      <div class="card"><div class="title">Habits</div></div>

      ${habits.map(h => `
        <div class="card">
          <div class="title">${h.name}</div>
          <div class="subtitle">🔥 Streak: ${h.streak}</div>
          <button onclick="window.__completeHabit(${h.id})">Complete</button>
        </div>
      `).join("")}

      <div class="card">
        <input id="habitInput" placeholder="New habit..." style="width:100%;padding:10px;border-radius:10px;border:none;background:rgba(255,255,255,0.05);color:white;" />
        <button onclick="window.__addHabit()">Add Habit</button>
      </div>
    `;
  }

  /* ---------------- DASHBOARD (INTELLIGENCE LAYER) ---------------- */
  function renderDashboard() {
    const score = getMomentumScore();
    const tasks = getTaskStats();
    const habits = getHabitStats();

    return `
      <div class="card">
        <div class="title">Momentum Score</div>
        <div class="subtitle">Your productivity identity metric</div>
      </div>

      <div class="card">
        <div class="title">${score.score}/100</div>
        <div class="subtitle">Task: ${score.taskScore} | Habit: ${score.habitScore}</div>
      </div>

      <div class="card">
        <div class="title">Tasks</div>
        <div class="subtitle">
          Total: ${tasks.total} | Done: ${tasks.done} | Rate: ${tasks.rate}%
        </div>
      </div>

      <div class="card">
        <div class="title">Habits</div>
        <div class="subtitle">
          Total: ${habits.total} | Avg Streak: ${habits.avgStreak}
        </div>
      </div>
    `;
  }

  const pages = {
    dashboard: renderDashboard(),
    tasks: renderTasks(),
    notes: renderNotes(),
    habits: renderHabits(),
    calendar: `<div class="card"><div class="title">Calendar</div></div>`,
    scratchpad: `<div class="card"><div class="title">Scratchpad</div></div>`,
    spaces: `<div class="card"><div class="title">Spaces</div></div>`,
    insights: `<div class="card"><div class="title">Insights</div></div>`,
    settings: `<div class="card"><div class="title">Settings</div></div>`
  };

  /* ---------------- GLOBAL FUNCTIONS ---------------- */

  window.__addTask = () => {
    const i = document.getElementById("taskInput");
    if (!i.value.trim()) return;
    addTask(i.value);
    loadPage("tasks");
  };

  window.__deleteTask = (id) => {
    deleteTask(id);
    loadPage("tasks");
  };

  window.__toggleTask = (id) => {
    toggleTask(id);
    loadPage("tasks");
  };

  window.__addNote = () => {
    const t = document.getElementById("noteTitle").value;
    const c = document.getElementById("noteContent").value;
    if (!t.trim() || !c.trim()) return;
    addNote(t, c);
    loadPage("notes");
  };

  window.__deleteNote = (id) => {
    deleteNote(id);
    loadPage("notes");
  };

  window.__addHabit = () => {
    const i = document.getElementById("habitInput");
    if (!i.value.trim()) return;
    addHabit(i.value);
    loadPage("habits");
  };

  window.__completeHabit = (id) => {
    completeHabit(id);
    loadPage("habits");
  };

  loadPage("dashboard");

</script>

</body>
</html>
