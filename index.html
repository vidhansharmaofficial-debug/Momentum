<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Momentum</title>

<style>
:root {
  --bg: #0b0c10;
  --panel: rgba(255,255,255,0.04);
  --panel-strong: rgba(255,255,255,0.07);
  --text: rgba(255,255,255,0.92);
  --muted: rgba(255,255,255,0.55);
  --border: rgba(255,255,255,0.08);
  --accent: #7c5cff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui;
  transition: background 0.2s ease, transform 0.15s ease, opacity 0.2s ease;
}

body {
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, rgba(124,92,255,0.08), transparent 40%);
  pointer-events: none;
}

.app {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 240px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  padding: 16px;
}

.logo {
  font-weight: 600;
  margin-bottom: 20px;
}

.nav-item {
  padding: 10px;
  cursor: pointer;
  color: var(--muted);
  border-radius: 10px;
  margin-bottom: 6px;
}

.nav-item:hover {
  background: rgba(255,255,255,0.05);
  color: var(--text);
}

.nav-item.active {
  background: rgba(124,92,255,0.2);
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.topbar {
  height: 50px;
  background: var(--panel);
  display: flex;
  align-items: center;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
}

.content {
  padding: 28px;
  overflow: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
  opacity: 1;
}

.card {
  background: var(--panel);
  padding: 18px;
  border-radius: 14px;
  border: 1px solid var(--border);
}

.card:hover {
  background: var(--panel-strong);
}

.title {
  font-size: 18px;
  font-weight: 600;
}

.subtitle {
  font-size: 13px;
  color: var(--muted);
}

button {
  margin-top: 10px;
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(124,92,255,0.9);
  color: white;
  cursor: pointer;
}

button:hover {
  transform: translateY(-1px);
}

/* palette */
#palette {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
}

#cmdInput {
  width: 420px;
  padding: 14px;
}
</style>
</head>

<body>

<div class="app">

  <div class="sidebar">
    <div class="logo">⚡ Momentum</div>
    <div class="nav-item active" onclick="loadPage('dashboard', this)">Dashboard</div>
    <div class="nav-item" onclick="loadPage('tasks', this)">Tasks</div>
    <div class="nav-item" onclick="loadPage('notes', this)">Notes</div>
    <div class="nav-item" onclick="loadPage('habits', this)">Habits</div>
    <div class="nav-item" onclick="loadPage('focus', this)">Focus</div>
  </div>

  <div class="main">
    <div class="topbar">⚡ Momentum</div>
    <div class="content" id="content"></div>
  </div>

</div>

<div id="palette">
  <input id="cmdInput" placeholder="command..." />
</div>

<script type="module">

import { getStore } from "./src/core/store.js";
import { addTask, deleteTask, toggleTask } from "./src/modules/tasks.js";
import { addNote } from "./src/modules/notes.js";
import { getHabits } from "./src/modules/habits.js";
import { getTaskStats, getHabitStats, getMomentumScore } from "./src/modules/insights.js";
import { startFocus, stopFocus, getFocusState } from "./src/modules/focusEngine.js";

let current = "dashboard";

const content = document.getElementById("content");
const items = document.querySelectorAll(".nav-item");

function render() {
  content.innerHTML = pages[current]();
}

function loadPage(p, el) {
  current = p;
  render();
  items.forEach(i => i.classList.remove("active"));
  if (el) el.classList.add("active");
}

/* DASHBOARD */
function dashboard() {
  const score = getMomentumScore();
  const tasks = getTaskStats();
  const habits = getHabitStats();

  return `
    <div class="card"><div class="title">Score ${score.score}/100</div></div>
    <div class="card"><div class="subtitle">Tasks ${tasks.done}/${tasks.total}</div></div>
    <div class="card"><div class="subtitle">Habits avg ${habits.avgStreak}</div></div>
  `;
}

/* TASKS */
function tasks() {
  const store = getStore();

  return store.tasks.map(t => `
    <div class="card">
      ${t.text}
      <button onclick="window.__toggleTask(${t.id})">toggle</button>
      <button onclick="window.__deleteTask(${t.id})">delete</button>
    </div>
  `).join("");
}

/* NOTES */
function notes() {
  const store = getStore();

  return store.notes.map(n => `
    <div class="card">
      <div class="title">${n.title}</div>
      <div class="subtitle">${n.content}</div>
    </div>
  `).join("");
}

/* HABITS */
function habits() {
  return getHabits().map(h => `
    <div class="card">${h.name} 🔥${h.streak}</div>
  `).join("");
}

/* FOCUS */
function focus() {
  const state = getFocusState();
  const m = Math.floor(state.remainingSeconds / 60);
  const s = state.remainingSeconds % 60;

  return `
    <div class="card"><div class="title">Focus ${state.active ? "ON" : "OFF"}</div></div>
    <div class="card">
      <div class="title">${m}:${s.toString().padStart(2,'0')}</div>
      <button onclick="window.__startFocus()">start</button>
      <button onclick="window.__stopFocus()">stop</button>
    </div>
  `;
}

const pages = { dashboard, tasks, notes, habits, focus };

/* palette */
const palette = document.getElementById("palette");
const input = document.getElementById("cmdInput");

window.addEventListener("keydown", e => {
  if (e.ctrlKey && e.key === "k") {
    palette.style.display = "flex";
    input.focus();
  }
  if (e.key === "Escape") palette.style.display = "none";
});

input.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;

  const v = input.value.trim().toLowerCase();

  if (v === "tasks") loadPage("tasks");
  if (v === "notes") loadPage("notes");
  if (v === "focus") loadPage("focus");

  if (v.startsWith("task:")) addTask(v.replace("task:", ""));
  if (v.startsWith("note:")) addNote("note", v.replace("note:", ""));

  palette.style.display = "none";
  input.value = "";
});

/* actions */
window.__toggleTask = toggleTask;
window.__deleteTask = deleteTask;
window.__startFocus = () => startFocus(25);
window.__stopFocus = stopFocus;

/* init */
render();

</script>

</body>
</html>
