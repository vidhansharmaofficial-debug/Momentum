<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Momentum</title>

  <style>
    :root {
      --bg: #0f0f12;
      --panel: rgba(22,22,26,0.75);
      --text: #fff;
      --muted: rgba(255,255,255,0.6);
      --border: rgba(255,255,255,0.06);
      --accent: #7c5cff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui;
    }

    body {
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 240px;
      background: var(--panel);
      padding: 16px;
      border-right: 1px solid var(--border);
    }

    .logo {
      font-weight: 600;
      margin-bottom: 20px;
    }

    .nav-item {
      padding: 10px;
      cursor: pointer;
      color: var(--muted);
      border-radius: 10px;
      margin-bottom: 6px;
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text);
    }

    .nav-item.active {
      background: rgba(124,92,255,0.2);
      color: var(--text);
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 50px;
      background: var(--panel);
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
    }

    .content {
      padding: 20px;
      overflow: auto;
    }

    .card {
      background: var(--panel);
      padding: 18px;
      border-radius: 14px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      animation: fade 0.2s ease;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    button {
      margin-top: 8px;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.96);
    }

    /* COMMAND PALETTE */
    #palette {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #cmdInput {
      width: 420px;
      padding: 14px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    .focus-glow {
      border: 1px solid rgba(124,92,255,0.4);
      box-shadow: 0 0 20px rgba(124,92,255,0.15);
    }
  </style>
</head>

<body>

<div class="app">

  <div class="sidebar">
    <div class="logo">⚡ Momentum</div>

    <div class="nav-item active" onclick="loadPage('dashboard', this)">Dashboard</div>
    <div class="nav-item" onclick="loadPage('tasks', this)">Tasks</div>
    <div class="nav-item" onclick="loadPage('notes', this)">Notes</div>
    <div class="nav-item" onclick="loadPage('habits', this)">Habits</div>
    <div class="nav-item" onclick="loadPage('focus', this)">Focus</div>
  </div>

  <div class="main">
    <div class="topbar">⚡ Momentum</div>
    <div class="content" id="content"></div>
  </div>

</div>

<!-- COMMAND PALETTE -->
<div id="palette">
  <input id="cmdInput" placeholder="Type command..." />
</div>

<script type="module">

import { getStore } from "./src/core/store.js";
import { addTask, deleteTask, toggleTask } from "./src/modules/tasks.js";
import { addNote } from "./src/modules/notes.js";
import { addHabit, getHabits } from "./src/modules/habits.js";
import { getTaskStats, getHabitStats, getMomentumScore } from "./src/modules/insights.js";
import { startFocus, stopFocus, getFocusState } from "./src/modules/focusEngine.js";

let currentPage = "dashboard";

const content = document.getElementById("content");
const items = document.querySelectorAll(".nav-item");

/* ---------------- RENDER ---------------- */

function render() {
  content.innerHTML = pages[currentPage]();
}

/* ---------------- LIVE SYSTEM ---------------- */

setInterval(() => {
  if (currentPage === "dashboard" || currentPage === "focus") {
    render();
  }

  if (currentPage === "focus") {
    const state = getFocusState();
    const el = document.getElementById("timer");
    if (el) {
      const m = Math.floor(state.remainingSeconds / 60);
      const s = state.remainingSeconds % 60;
      el.innerText = `${m}:${s.toString().padStart(2,'0')}`;
    }
  }
}, 1000);

/* ---------------- NAV ---------------- */

function loadPage(page, el) {
  currentPage = page;

  content.style.opacity = "0";

  setTimeout(() => {
    render();
    content.style.opacity = "1";
  }, 100);

  items.forEach(i => i.classList.remove("active"));
  if (el) el.classList.add("active");
}

/* ---------------- PAGES ---------------- */

function dashboard() {
  const score = getMomentumScore();
  const tasks = getTaskStats();
  const habits = getHabitStats();

  return `
    <div class="card"><b>Momentum Score</b><br>${score.score}/100</div>
    <div class="card">Tasks: ${tasks.done}/${tasks.total}</div>
    <div class="card">Habits Avg: ${habits.avgStreak}</div>
  `;
}

function tasks() {
  const store = getStore();

  return `
    <div class="card"><b>Tasks</b></div>

    ${store.tasks.map(t => `
      <div class="card">
        ${t.text}
        <br>
        <button onclick="window.__toggleTask(${t.id})">Toggle</button>
        <button onclick="window.__deleteTask(${t.id})">Delete</button>
      </div>
    `).join("")}
  `;
}

function notes() {
  const store = getStore();

  return `
    <div class="card"><b>Notes</b></div>

    ${store.notes.map(n => `
      <div class="card">
        <b>${n.title}</b><br>${n.content}
      </div>
    `).join("")}
  `;
}

function habits() {
  const h = getHabits();

  return `
    <div class="card"><b>Habits</b></div>

    ${h.map(x => `
      <div class="card">
        ${x.name} - 🔥 ${x.streak}
      </div>
    `).join("")}
  `;
}

function focus() {
  const state = getFocusState();

  return `
    <div class="card focus-glow">
      <b>Focus Mode</b>
    </div>

    <div class="card">
      <div id="timer">
        ${Math.floor(state.remainingSeconds / 60)}:00
      </div>

      <button onclick="window.__startFocus()">Start</button>
      <button onclick="window.__stopFocus()">Stop</button>
    </div>
  `;
}

const pages = { dashboard, tasks, notes, habits, focus };

/* ---------------- COMMAND PALETTE ---------------- */

const palette = document.getElementById("palette");
const cmdInput = document.getElementById("cmdInput");

window.addEventListener("keydown", (e) => {
  if (e.ctrlKey && e.key === "k") {
    e.preventDefault();
    palette.style.display = "flex";
    cmdInput.focus();
  }

  if (e.key === "Escape") {
    palette.style.display = "none";
  }
});

cmdInput.addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;

  const v = cmdInput.value.toLowerCase();

  if (v === "dashboard") loadPage("dashboard");
  else if (v === "tasks") loadPage("tasks");
  else if (v === "notes") loadPage("notes");
  else if (v === "habits") loadPage("habits");
  else if (v === "focus") loadPage("focus");

  else if (v.startsWith("task:")) {
    addTask(v.replace("task:", ""));
  }

  palette.style.display = "none";
  cmdInput.value = "";
});

/* ---------------- ACTIONS ---------------- */

window.__toggleTask = (id) => toggleTask(id);
window.__deleteTask = (id) => deleteTask(id);
window.__startFocus = () => startFocus(25);
window.__stopFocus = () => stopFocus();

/* ---------------- INIT ---------------- */

render();

</script>

</body>
</html>
