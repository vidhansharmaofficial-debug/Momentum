<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Momentum</title>

  <style>
    :root {
      --bg: #0f0f12;
      --panel: rgba(22, 22, 26, 0.75);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.6);
      --border: rgba(255,255,255,0.06);
      --accent: #7c5cff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 16px;
      backdrop-filter: blur(12px);
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .nav-item {
      padding: 10px;
      border-radius: 12px;
      color: var(--muted);
      cursor: pointer;
      margin-bottom: 6px;
      transition: all 0.2s ease;
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text);
    }

    .nav-item.active {
      background: rgba(124,92,255,0.18);
      color: var(--text);
    }

    /* MAIN */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* TOPBAR */
    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      backdrop-filter: blur(12px);
    }

    .search {
      flex: 1;
      margin-right: 16px;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: none;
      color: var(--text);
      outline: none;
    }

    .icons {
      display: flex;
      gap: 12px;
      color: var(--muted);
    }

    /* CONTENT */
    .content {
      padding: 24px;
      overflow: auto;
      transition: opacity 0.15s ease;
    }

    .card {
      background: var(--panel);
      padding: 20px;
      border-radius: 18px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .title {
      font-size: 22px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="logo">⚡ Momentum</div>

      <div class="nav-item active" onclick="loadPage('dashboard', this)">Dashboard</div>
      <div class="nav-item" onclick="loadPage('tasks', this)">Tasks</div>
      <div class="nav-item" onclick="loadPage('notes', this)">Notes</div>
      <div class="nav-item" onclick="loadPage('calendar', this)">Calendar</div>
      <div class="nav-item" onclick="loadPage('scratchpad', this)">Scratchpad</div>
      <div class="nav-item" onclick="loadPage('spaces', this)">Spaces</div>
      <div class="nav-item" onclick="loadPage('insights', this)">Insights</div>
      <div class="nav-item" onclick="loadPage('settings', this)">Settings</div>
    </div>

    <!-- MAIN -->
    <div class="main">

      <div class="topbar">
        <input class="search" placeholder="Search Momentum..." />
        <div class="icons">🔔 🎵 👤</div>
      </div>

      <div class="content" id="content"></div>

    </div>
  </div>

  <script type="module">
    import { getStore } from "./src/core/store.js";
    import { addTask, deleteTask, toggleTask } from "./src/modules/tasks.js";
    import { addNote, deleteNote } from "./src/modules/notes.js";

    const content = document.getElementById("content");
    const items = document.querySelectorAll(".nav-item");

    function loadPage(page, el) {
      content.style.opacity = "0";

      setTimeout(() => {
        content.innerHTML = pages[page] || "";
        content.style.opacity = "1";
      }, 120);

      items.forEach(i => i.classList.remove("active"));
      if (el) el.classList.add("active");
    }

    // ---------- TASK UI ----------
    function renderTasks() {
      const store = getStore();

      return `
        <div class="card">
          <div class="title">Tasks</div>
          <div class="subtitle">Your productivity system</div>
        </div>

        ${store.tasks.map(t => `
          <div class="card">
            <div class="title" style="${t.done ? 'text-decoration:line-through;opacity:0.5;' : ''}">
              ${t.text}
            </div>
            <button onclick="window.__toggleTask(${t.id})">Toggle</button>
            <button onclick="window.__deleteTask(${t.id})">Delete</button>
          </div>
        `).join("")}

        <div class="card">
          <input id="taskInput" placeholder="Add task..." style="width:100%;padding:10px;border-radius:10px;border:none;background:rgba(255,255,255,0.05);color:white;"/>
          <button onclick="window.__addTask()">Add Task</button>
        </div>
      `;
    }

    // ---------- NOTES UI ----------
    function renderNotes() {
      const store = getStore();

      return `
        <div class="card">
          <div class="title">Notes</div>
          <div class="subtitle">Your thinking space</div>
        </div>

        <div class="card">
          <input id="noteTitle" placeholder="Title..." style="width:100%;padding:10px;border-radius:10px;border:none;background:rgba(255,255,255,0.05);color:white;margin-bottom:10px;"/>
          <textarea id="noteContent" placeholder="Write note..." style="width:100%;height:120px;padding:10px;border-radius:10px;border:none;background:rgba(255,255,255,0.05);color:white;"></textarea>
          <button onclick="window.__addNote()">Save Note</button>
        </div>

        ${store.notes.map(n => `
          <div class="card">
            <div class="title">${n.title}</div>
            <div class="subtitle">${n.content}</div>
            <button onclick="window.__deleteNote(${n.id})">Delete</button>
          </div>
        `).join("")}
      `;
    }

    const pages = {
      dashboard: `<div class="card"><div class="title">Dashboard</div></div>`,
      tasks: renderTasks(),
      notes: renderNotes(),
      calendar: `<div class="card"><div class="title">Calendar</div></div>`,
      scratchpad: `<div class="card"><div class="title">Scratchpad</div></div>`,
      spaces: `<div class="card"><div class="title">Spaces</div></div>`,
      insights: `<div class="card"><div class="title">Insights</div></div>`,
      settings: `<div class="card"><div class="title">Settings</div></div>`
    };

    // ---------- GLOBAL FUNCTIONS ----------
    window.__addTask = () => {
      const input = document.getElementById("taskInput");
      if (!input.value.trim()) return;
      addTask(input.value);
      loadPage("tasks");
    };

    window.__deleteTask = (id) => {
      deleteTask(id);
      loadPage("tasks");
    };

    window.__toggleTask = (id) => {
      toggleTask(id);
      loadPage("tasks");
    };

    window.__addNote = () => {
      const title = document.getElementById("noteTitle").value;
      const content = document.getElementById("noteContent").value;
      if (!title.trim() || !content.trim()) return;
      addNote(title, content);
      loadPage("notes");
    };

    window.__deleteNote = (id) => {
      deleteNote(id);
      loadPage("notes");
    };

    loadPage("dashboard");
  </script>

</body>
</html>
