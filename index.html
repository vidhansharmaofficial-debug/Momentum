<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Momentum</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f0f12;
      color: white;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .card {
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      background: #16161a;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 40px;
      margin: 0;
    }

    p {
      opacity: 0.7;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Momentum</h1>
    <p>Your Productivity OS is starting...</p>
  </div>
</body>
</html>
