<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Momentum</title>

<style>
:root {
  --bg: #0b0c10;
  --panel: rgba(255,255,255,0.04);
  --panel-strong: rgba(255,255,255,0.07);
  --text: rgba(255,255,255,0.92);
  --muted: rgba(255,255,255,0.55);
  --border: rgba(255,255,255,0.08);
  --accent: #7c5cff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui;
}

body {
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

.app {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  padding: 16px;
}

.logo {
  font-weight: 600;
  margin-bottom: 20px;
}

.nav-item {
  padding: 10px;
  cursor: pointer;
  color: var(--muted);
  border-radius: 10px;
  margin-bottom: 6px;
}

.nav-item:hover {
  background: rgba(255,255,255,0.05);
  color: var(--text);
}

.nav-item.active {
  background: rgba(124,92,255,0.2);
  color: var(--text);
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.topbar {
  height: 50px;
  background: var(--panel);
  display: flex;
  align-items: center;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
}

/* LAYOUT FIX (IMPORTANT) */
.content {
  padding: 28px;
  overflow: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.card {
  background: var(--panel);
  padding: 18px;
  border-radius: 14px;
  border: 1px solid var(--border);
  margin-bottom: 0;
  animation: fade 0.2s ease;
}

.card:hover {
  background: var(--panel-strong);
  transform: translateY(-1px);
  transition: 0.15s;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 6px;
}

.subtitle {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.4;
}

button {
  margin-top: 10px;
  padding: 9px 12px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: white;
  cursor: pointer;
  transition: transform 0.08s ease, opacity 0.2s ease;
}

button:active {
  transform: scale(0.96);
  opacity: 0.85;
}

/* COMMAND PALETTE */
#palette {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

#cmdInput {
  width: 420px;
  padding: 14px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 14px;
}

.focus-glow {
  border: 1px solid rgba(124,92,255,0.4);
  box-shadow: 0 0 20px rgba(124,92,255,0.15);
}

</style>
</head>

<body>

<div class="app">

  <div class="sidebar">
    <div class="logo">⚡ Momentum</div>

    <div class="nav-item active" onclick="loadPage('dashboard', this)">Dashboard</div>
    <div class="nav-item" onclick="loadPage('tasks', this)">Tasks</div>
    <div class="nav-item" onclick="loadPage('notes', this)">Notes</div>
    <div class="nav-item" onclick="loadPage('habits', this)">Habits</div>
    <div class="nav-item" onclick="loadPage('focus', this)">Focus</div>
  </div>

  <div class="main">
    <div class="topbar">⚡ Momentum</div>
    <div class="content" id="content"></div>
  </div>

</div>

<!-- COMMAND PALETTE -->
<div id="palette">
  <input id="cmdInput" placeholder="Type command..." />
</div>

<script type="module">

import { getStore } from "./src/core/store.js";
import { addTask, deleteTask, toggleTask } from "./src/modules/tasks.js";
import { addNote } from "./src/modules/notes.js";
import { addHabit, getHabits } from "./src/modules/habits.js";
import { getTaskStats, getHabitStats, getMomentumScore } from "./src/modules/insights.js";
import { startFocus, stopFocus, getFocusState } from "./src/modules/focusEngine.js";

let currentPage = "dashboard";

const content = document.getElementById("content");
const items = document.querySelectorAll(".nav-item");

/* ---------------- RENDER ---------------- */

function render() {
  content.innerHTML = pages[currentPage]();
}

/* ---------------- LIVE TIMER ---------------- */

setInterval(() => {
  if (currentPage === "focus") {
    const state = getFocusState();
    const el = document.getElementById("timer");

    if (el) {
      const m = Math.floor(state.remainingSeconds / 60);
      const s = state.remainingSeconds % 60;
      el.innerText = `${m}:${s.toString().padStart(2,'0')}`;
    }
  }
}, 1000);

/* ---------------- NAV ---------------- */

function loadPage(page, el) {
  currentPage = page;

  content.style.opacity = "0";

  setTimeout(() => {
    render();
    content.style.opacity = "1";
  }, 100);

  items.forEach(i => i.classList.remove("active"));
  if (el) el.classList.add("active");
}

/* ---------------- DASHBOARD (REDESIGNED) ---------------- */

function dashboard() {
  const score = getMomentumScore();
  const tasks = getTaskStats();
  const habits = getHabitStats();

  return `
    <div class="card">
      <div class="title">Momentum System</div>
      <div class="subtitle">Live productivity engine</div>
    </div>

    <div class="card">
      <div class="title">Score</div>
      <div class="subtitle" style="font-size:26px;font-weight:600;">
        ${score.score}/100
      </div>
    </div>

    <div class="card">
      <div class="title">Execution</div>
      <div class="subtitle">
        Tasks: ${tasks.done}/${tasks.total} • Rate: ${tasks.rate}%
      </div>
    </div>

    <div class="card">
      <div class="title">Consistency</div>
      <div class="subtitle">
        Habits Avg Streak: ${habits.avgStreak}
      </div>
    </div>
  `;
}

/* ---------------- PAGES ---------------- */

function tasks() {
  const store = getStore();

  return `
    <div class="card"><div class="title">Tasks</div></div>

    ${store.tasks.map(t => `
      <div class="card">
        ${t.text}
        <button onclick="window.__toggleTask(${t.id})">Toggle</button>
        <button onclick="window.__deleteTask(${t.id})">Delete</button>
      </div>
    `).join("")}
  `;
}

function notes() {
  const store = getStore();

  return `
    <div class="card"><div class="title">Notes</div></div>

    ${store.notes.map(n => `
      <div class="card">
        <div class="title">${n.title}</div>
        <div class="subtitle">${n.content}</div>
      </div>
    `).join("")}
  `;
}

function habits() {
  const h = getHabits();

  return `
    <div class="card"><div class="title">Habits</div></div>

    ${h.map(x => `
      <div class="card">
        ${x.name} — 🔥 ${x.streak}
      </div>
    `).join("")}
  `;
}

function focus() {
  const state = getFocusState();
  const activeClass = state.active ? "focus-glow" : "";

  return `
    <div class="card ${activeClass}">
      <div class="title">Focus Mode</div>
      <div class="subtitle">
        ${state.active ? "You are in deep work" : "Ready to start session"}
      </div>
    </div>

    <div class="card">
      <div class="title" id="timer">
        ${Math.floor(state.remainingSeconds / 60)}:00
      </div>

      <button onclick="window.__startFocus()">Start 25 min</button>
      <button onclick="window.__stopFocus()">Stop</button>
    </div>
  `;
}

const pages = { dashboard, tasks, notes, habits, focus };

/* ---------------- COMMAND PALETTE ---------------- */

const palette = document.getElementById("palette");
const cmdInput = document.getElementById("cmdInput");

window.addEventListener("keydown", (e) => {
  if (e.ctrlKey && e.key === "k") {
    e.preventDefault();
    palette.style.display = "flex";
    cmdInput.focus();
  }

  if (e.key === "Escape") {
    palette.style.display = "none";
  }
});

const suggestions = ["dashboard","tasks","notes","habits","focus","task:","note:"];

cmdInput.addEventListener("input", () => {
  const v = cmdInput.value.toLowerCase();
  const match = suggestions.find(s => s.startsWith(v));
  cmdInput.placeholder = match ? `Try: ${match}` : "Type command...";
});

cmdInput.addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;

  const v = cmdInput.value.toLowerCase();

  if (v === "dashboard") loadPage("dashboard");
  else if (v === "tasks") loadPage("tasks");
  else if (v === "notes") loadPage("notes");
  else if (v === "habits") loadPage("habits");
  else if (v === "focus") loadPage("focus");

  else if (v.startsWith("task:")) {
    addTask(v.replace("task:", ""));
  }

  palette.style.display = "none";
  cmdInput.value = "";
});

/* ---------------- ACTIONS ---------------- */

window.__toggleTask = (id) => toggleTask(id);
window.__deleteTask = (id) => deleteTask(id);
window.__startFocus = () => startFocus(25);
window.__stopFocus = () => stopFocus();

/* ---------------- INIT ---------------- */

render();

</script>

</body>
</html>
