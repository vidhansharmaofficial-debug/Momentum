<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Momentum</title>

<style>
:root {
  --bg: #0b0c10;
  --panel: rgba(255,255,255,0.04);
  --panel-strong: rgba(255,255,255,0.07);
  --text: rgba(255,255,255,0.92);
  --muted: rgba(255,255,255,0.55);
  --border: rgba(255,255,255,0.08);
  --accent: #7c5cff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui;
}

body {
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

.app {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 240px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  padding: 16px;
}

.logo {
  font-weight: 600;
  margin-bottom: 20px;
}

.nav-item {
  padding: 10px;
  cursor: pointer;
  color: var(--muted);
  border-radius: 10px;
  margin-bottom: 6px;
}

.nav-item:hover {
  background: rgba(255,255,255,0.05);
  color: var(--text);
}

.nav-item.active {
  background: rgba(124,92,255,0.2);
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.topbar {
  height: 50px;
  background: var(--panel);
  display: flex;
  align-items: center;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
}

.content {
  padding: 24px;
  overflow: auto;
}

.card {
  background: var(--panel);
  padding: 16px;
  border-radius: 12px;
  border: 1px solid var(--border);
  margin-bottom: 12px;
}

.title {
  font-weight: 600;
  margin-bottom: 6px;
}

.subtitle {
  color: var(--muted);
  font-size: 13px;
}

button {
  margin-top: 10px;
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="app">
  <div class="sidebar">
    <div class="logo">⚡ Momentum</div>

    <div class="nav-item active" onclick="loadPage('dashboard')">Dashboard</div>
    <div class="nav-item" onclick="loadPage('tasks')">Tasks</div>
    <div class="nav-item" onclick="loadPage('notes')">Notes</div>
    <div class="nav-item" onclick="loadPage('habits')">Habits</div>
    <div class="nav-item" onclick="loadPage('focus')">Focus</div>
  </div>

  <div class="main">
    <div class="topbar">⚡ Momentum</div>
    <div class="content" id="content"></div>
  </div>
</div>

<script type="module">

import { getStore } from "./src/core/store.js";
import { addTask, deleteTask, toggleTask } from "./src/modules/tasks.js";
import { addNote } from "./src/modules/notes.js";
import { getHabits } from "./src/modules/habits.js";
import { getTaskStats, getHabitStats, getMomentumScore } from "./src/modules/insights.js";
import { startFocus, stopFocus, getFocusState } from "./src/modules/focusEngine.js";

let currentPage = "dashboard";
const content = document.getElementById("content");

/* ---------------- SAFE PAGES ---------------- */

function dashboard() {
  const score = getMomentumScore();
  const tasks = getTaskStats();
  const habits = getHabitStats();

  return `
    <div class="card">
      <div class="title">Momentum Score</div>
      <div class="subtitle">${score.score}/100</div>
    </div>

    <div class="card">
      <div class="title">Tasks</div>
      <div class="subtitle">${tasks.done}/${tasks.total}</div>
    </div>

    <div class="card">
      <div class="title">Habits</div>
      <div class="subtitle">Avg streak: ${habits.avgStreak}</div>
    </div>
  `;
}

function tasks() {
  const store = getStore();

  return (store.tasks || []).map(t => `
    <div class="card">
      <div class="title">${t.text}</div>
      <button onclick="__toggleTask(${t.id})">Toggle</button>
      <button onclick="__deleteTask(${t.id})">Delete</button>
    </div>
  `).join("");
}

function notes() {
  const store = getStore();

  return (store.notes || []).map(n => `
    <div class="card">
      <div class="title">${n.title}</div>
      <div class="subtitle">${n.content}</div>
    </div>
  `).join("");
}

function habits() {
  return (getHabits() || []).map(h => `
    <div class="card">
      ${h.name} 🔥 ${h.streak}
    </div>
  `).join("");
}

function focus() {
  const state = getFocusState();

  const m = Math.floor(state.remainingSeconds / 60);
  const s = state.remainingSeconds % 60;

  return `
    <div class="card">
      <div class="title">Focus Mode</div>
      <div class="subtitle">${state.active ? "Running" : "Stopped"}</div>
    </div>

    <div class="card">
      <div class="title">${m}:${s.toString().padStart(2,'0')}</div>
      <button onclick="__startFocus()">Start</button>
      <button onclick="__stopFocus()">Stop</button>
    </div>
  `;
}

const pages = { dashboard, tasks, notes, habits, focus };

/* ---------------- SAFE RENDER ---------------- */

function render() {
  try {
    content.innerHTML = (pages[currentPage] || dashboard)();
  } catch (e) {
    console.error(e);
    content.innerHTML = `<div class="card">Error loading page</div>`;
  }
}

window.loadPage = (page) => {
  currentPage = page;
  render();
};

/* ---------------- GLOBAL ACTIONS ---------------- */

window.__toggleTask = (id) => {
  toggleTask(id);
  render();
};

window.__deleteTask = (id) => {
  deleteTask(id);
  render();
};

window.__startFocus = () => {
  startFocus(25);
  render();
};

window.__stopFocus = () => {
  stopFocus();
  render();
};

/* ---------------- INIT ---------------- */

render();

</script>

</body>
</html>
