<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Momentum</title>

  <style>
    .focus-glow {
      border: 1px solid rgba(124,92,255,0.4);
      box-shadow: 0 0 30px rgba(124,92,255,0.15);
    }

    button {
      transition: transform 0.08s ease, opacity 0.2s ease;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 10px;
      border: none;
      background: #7c5cff;
      color: white;
      cursor: pointer;
      margin-right: 6px;
    }

    button:active {
      transform: scale(0.96);
      opacity: 0.8;
    }

    .card {
      animation: cardIn 0.25s ease;
      background: rgba(22,22,26,0.75);
      padding: 20px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 16px;
      color: white;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-out {
      opacity: 0 !important;
      transform: translateY(6px);
      transition: all 0.15s ease;
    }

    .fade-in {
      opacity: 1;
      transform: translateY(0);
      transition: all 0.2s ease;
    }

    body {
      margin: 0;
      background: #0f0f12;
      font-family: system-ui;
      color: white;
      overflow: hidden;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 240px;
      background: rgba(22,22,26,0.75);
      padding: 16px;
    }

    .nav-item {
      padding: 10px;
      cursor: pointer;
      color: rgba(255,255,255,0.6);
    }

    .nav-item.active {
      color: white;
      background: rgba(124,92,255,0.2);
      border-radius: 10px;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 50px;
      background: rgba(22,22,26,0.75);
      display: flex;
      align-items: center;
      padding: 0 16px;
    }

    .content {
      padding: 20px;
      overflow: auto;
    }

    .title { font-size: 18px; margin-bottom: 6px; }
    .subtitle { color: rgba(255,255,255,0.6); }
  </style>
</head>

<body>
<div class="app">

  <div class="sidebar">
    <div class="nav-item active" onclick="loadPage('dashboard', this)">Dashboard</div>
    <div class="nav-item" onclick="loadPage('tasks', this)">Tasks</div>
    <div class="nav-item" onclick="loadPage('notes', this)">Notes</div>
    <div class="nav-item" onclick="loadPage('habits', this)">Habits</div>
    <div class="nav-item" onclick="loadPage('focus', this)">Focus</div>
  </div>

  <div class="main">
    <div class="topbar">⚡ Momentum</div>
    <div class="content" id="content"></div>
  </div>

</div>

<script type="module">
  import { getStore } from "./src/core/store.js";
  import { addTask, deleteTask, toggleTask } from "./src/modules/tasks.js";
  import { addNote, deleteNote } from "./src/modules/notes.js";
  import { addHabit, completeHabit, getHabits } from "./src/modules/habits.js";
  import { getTaskStats, getHabitStats, getMomentumScore } from "./src/modules/insights.js";
  import { startFocus, stopFocus, getFocusState } from "./src/modules/focusEngine.js";

  let currentPage = "dashboard";

  const content = document.getElementById("content");
  const items = document.querySelectorAll(".nav-item");

  /* ---------------- PAGES ---------------- */

  function dashboard() {
    const score = getMomentumScore();
    const tasks = getTaskStats();
    const habits = getHabitStats();

    return `
      <div class="card">
        <div class="title">Momentum Score</div>
        <div class="subtitle">${score.score}/100</div>
      </div>

      <div class="card">
        <div class="title">Tasks</div>
        <div class="subtitle">${tasks.done}/${tasks.total}</div>
      </div>

      <div class="card">
        <div class="title">Habits</div>
        <div class="subtitle">Avg Streak: ${habits.avgStreak}</div>
      </div>
    `;
  }

  function tasks() {
    const store = getStore();

    return `
      <div class="card"><div class="title">Tasks</div></div>

      ${store.tasks.map(t => `
        <div class="card">
          <div class="title">${t.text}</div>
          <button onclick="window.__toggleTask(${t.id})">Toggle</button>
          <button onclick="window.__deleteTask(${t.id})">Delete</button>
        </div>
      `).join("")}
    `;
  }

  function notes() {
    const store = getStore();

    return `
      <div class="card"><div class="title">Notes</div></div>

      ${store.notes.map(n => `
        <div class="card">
          <div class="title">${n.title}</div>
          <div class="subtitle">${n.content}</div>
        </div>
      `).join("")}
    `;
  }

  function habits() {
    const h = getHabits();

    return `
      <div class="card"><div class="title">Habits</div></div>

      ${h.map(x => `
        <div class="card">
          <div class="title">${x.name}</div>
          <div class="subtitle">🔥 ${x.streak}</div>
        </div>
      `).join("")}
    `;
  }

  function focus() {
    const state = getFocusState();

    return `
      <div class="card focus-glow">
        <div class="title">Focus Mode</div>
        <div class="subtitle">Deep Work Session</div>
      </div>

      <div class="card">
        <div class="title">Timer</div>
        <div class="subtitle" id="focusTimer">
          ${Math.floor(state.remainingSeconds / 60)}:00
        </div>

        <button onclick="window.__startFocus()">Start 25 min</button>
        <button onclick="window.__stopFocus()">Stop</button>
      </div>
    `;
  }

  /* FIXED PAGES OBJECT */
  const pages = { dashboard, tasks, notes, habits, focus };

  /* ---------------- NAV ---------------- */

  function renderCurrentPage() {
    content.innerHTML = pages[currentPage]();
  }

  function loadPage(page, el) {
    currentPage = page;

    content.classList.add("fade-out");

    setTimeout(() => {
      renderCurrentPage();
      content.classList.remove("fade-out");
      content.classList.add("fade-in");
    }, 120);

    items.forEach(i => i.classList.remove("active"));
    if (el) el.classList.add("active");
  }

  /* ---------------- LIVE TIMER ---------------- */

  setInterval(() => {
    if (currentPage === "focus") {
      const state = getFocusState();
      const el = document.getElementById("focusTimer");

      if (el) {
        const m = Math.floor(state.remainingSeconds / 60);
        const s = state.remainingSeconds % 60;
        el.innerText = `${m}:${s.toString().padStart(2, "0")}`;
      }
    }
  }, 1000);

  /* ---------------- GLOBAL ACTIONS ---------------- */

  window.__startFocus = () => startFocus(25);
  window.__stopFocus = () => stopFocus();

  window.__toggleTask = (id) => toggleTask(id);
  window.__deleteTask = (id) => deleteTask(id);

  /* ---------------- INIT ---------------- */

  renderCurrentPage();

</script>

</body>
</html>
