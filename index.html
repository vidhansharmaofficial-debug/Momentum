<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Momentum</title>

  <style>
    :root {
      --bg: #0f0f12;
      --panel: #16161a;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.6);
      --accent: #7c5cff;
      --border: rgba(255,255,255,0.06);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* Layout */
    .app {
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 16px;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .nav-item {
      padding: 10px;
      border-radius: 10px;
      color: var(--muted);
      cursor: pointer;
      margin-bottom: 6px;
      transition: 0.2s;
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text);
    }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Topbar */
    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    .search {
      flex: 1;
      margin-right: 16px;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: none;
      color: var(--text);
      outline: none;
    }

    .icons {
      display: flex;
      gap: 12px;
      color: var(--muted);
    }

    /* Content */
    .content {
      padding: 24px;
    }

    .card {
      background: var(--panel);
      padding: 20px;
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    .title {
      font-size: 22px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo">⚡ Momentum</div>

      <div class="nav-item">Dashboard</div>
      <div class="nav-item">Tasks</div>
      <div class="nav-item">Calendar</div>
      <div class="nav-item">Notes</div>
      <div class="nav-item">Scratchpad</div>
      <div class="nav-item">Spaces</div>
      <div class="nav-item">Insights</div>
      <div class="nav-item">Settings</div>
    </div>

    <!-- Main -->
    <div class="main">

      <!-- Topbar -->
      <div class="topbar">
        <input class="search" placeholder="Search Momentum..." />
        <div class="icons">
          🔔 🎵 👤
        </div>
      </div>

      <!-- Content -->
      <div class="content">
        <div class="card">
          <div class="title">Welcome to Momentum</div>
          <div class="subtitle">
            Your Productivity OS is now live.
          </div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
